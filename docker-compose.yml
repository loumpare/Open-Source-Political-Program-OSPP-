services:

  # ── Ollama — LLM local ───────────────────────────────────────────────────────
  # Télécharge et sert qwen2.5:7b (~4.7 GB au premier démarrage).
  # GPU NVIDIA : décommenter la section "deploy" ci-dessous.
  ollama:
    image: ollama/ollama:latest
    container_name: ospp_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Ollama init — pull du modèle au premier démarrage ────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ospp_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen2.5:7b}"]
    restart: "no"

  # ── API — FastAPI + Mesa simulation ──────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ospp_api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
    volumes:
      - ./research/vectordb:/app/research/vectordb
      - votes_db:/app/research
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "8001"

  # ── Frontend — React + nginx (SPA + proxy /api → api:8001) ───────────────────
  # Not exposed directly — Caddy is the only public entry point.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    container_name: ospp_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"

  # ── Caddy — HTTPS reverse proxy ──────────────────────────────────────────────
  # Handles TLS automatically:
  #   DOMAIN=ospp.example.com  → Let's Encrypt (production)
  #   DOMAIN unset             → Caddy internal CA (localhost, self-signed)
  caddy:
    image: caddy:2-alpine
    container_name: ospp_caddy
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}

volumes:
  ollama_data:
  votes_db:
  caddy_data:
  caddy_config:
